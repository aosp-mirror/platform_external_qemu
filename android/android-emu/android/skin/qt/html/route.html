<!DOCTYPE html>
<html>
<head>
    <title>Android Emulator Location Picker</title>
    <meta name="viewport" content="initial-scale=1.0">
    <meta charset="utf-8">
<style>
#map {
    height: 100%;
}

html, body {
    height: 100%;
    margin: 0px;
    padding: 0px;
}
#description {
        font-family: Roboto;
        font-size: 15px;
        font-weight: 300;
      }

      #infowindow-content .title {
        font-weight: bold;
      }

      #infowindow-content {
        display: none;
      }

      #map #infowindow-content {
        display: inline;
      }

      .pac-card {
        margin: 10px 10px 0 0;
        border-radius: 2px 0 0 2px;
        box-sizing: border-box;
        -moz-box-sizing: border-box;
        outline: none;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        background-color: #fff;
        font-family: Roboto;
      }

      #pac-container {
        padding-bottom: 12px;
        margin-right: 12px;
      }

      .pac-controls {
        display: inline-block;
        padding: 5px 11px;
      }

      .pac-controls label {
        font-family: Roboto;
        font-size: 13px;
        font-weight: 300;
      }

      #pac-input {
        background-color: #fff;
        font-family: Roboto;
        font-size: 15px;
        font-weight: 300;
        padding: 0 11px 0 13px;
        text-overflow: ellipsis;
        width: 85%;
        margin-top: 12px;
        height: 36px;
      }

      #pac-input:focus {
        border-color: #4d90fe;
      }

      #title {
        color: #fff;
        background-color: #4d90fe;
        font-size: 25px;
        font-weight: 500;
        padding: 6px 12px;
      }
      #target {
        width: 345px;
      }
</style>
</head>
<body>
    <input id="pac-input" class="controls" type="text" placeholder="Search">
    <div id="map"></div>
    <script>
    // Googleplex!
    var lastLatLng = {lat: 37.4220919, lng: -122.0826088};
    var sevDeviceLocation;
    var gMap;
    var gFirstPoint;
    var gStartLatLng;

    // Callback function for Maps API
    function initMap() {
        var infoWindow = new google.maps.InfoWindow;
        var gMarkers = [];
        // Create a map object and specify the DOM element for display.
        gMap = new google.maps.Map(document.getElementById('map'), {
            center: lastLatLng,
            zoom: 10,
            zoomControl: true,
            disableDefaultUI: true
        });

        gFirstPoint = true;
        // Create 'start' and 'end' markers
        gStartMarker = new google.maps.Marker({
            map: gMap,
            position: lastLatLng
        });
        gEndMarker = new google.maps.Marker({
            map: gMap,
            position: lastLatLng
        });

        // Register a listener that sets a new marker wherever user clicks
        // on the map.
        google.maps.event.addListener(gMap, 'click', function(event) {
            var startMarker = 'data:image/svg+xml, \
                    <svg xmlns="http://www.w3.org/2000/svg" width="44px" height="44px" \
                            viewBox="0 0 44 44"> \
                        <circle cx="22" cy="22" r="14" stroke="#666666" stroke-width="7" \
                                fill="#ffffff" /> \
                    </svg>';
            var startMarkerImage = {
              url: startMarker,
              size: new google.maps.Size(24, 24),
              origin: new google.maps.Point(0, 0),
              anchor: new google.maps.Point(12, 12),
              scaledSize: new google.maps.Size(25, 25)
            };
            var endMarker = 'data:image/svg+xml, \
                    <svg xmlns="http://www.w3.org/2000/svg" width="44px" height="44px" \
                            viewBox="0 0 44 44"> \
                        <circle cx="22" cy="22" r="14" stroke="#666666" stroke-width="7" \
                                fill="#ffffff" /> \
                        <circle cx="22" cy="22" r="6" fill="#666666" /> \
                    </svg>';
            var endMarkerImage = {
              url: endMarker,
              size: new google.maps.Size(24, 24),
              origin: new google.maps.Point(0, 0),
              anchor: new google.maps.Point(12, 12),
              scaledSize: new google.maps.Size(25, 25)
            };

            if (gFirstPoint) {
                // Place the 'start' marker and erase the 'end' marker
                gStartMarker.setMap(null);
                gStartMarker = new google.maps.Marker({
                    map: gMap,
                    position: event.latLng
                });
                console.warn('JZK Route page: start: ' + event.latLng.lat() +
                             ', ' + event.latLng.lng()); // ??
                gStartMarker.setIcon(startMarkerImage);
                gEndMarker.setMap(null);
            } else {
                // Place the 'end' marker
                gEndMarker.setMap(null);
                gEndMarker = new google.maps.Marker({
                    map: gMap,
                    position: event.latLng
                });
                console.warn('JZK Route page: start: ' + lastLatLng.lat
                             + ', ' + lastLatLng.lng + ', end: '
                             + event.latLng.lat()
                             + ', ' + event.latLng.lng()); // ??
                gEndMarker.setIcon(endMarkerImage);
                // (leave the 'start' marker where it is)
            }
            gFirstPoint = !gFirstPoint;






            // Send the location coordinates to the emulator
            lastLatLng.lat = event.latLng.lat();
            lastLatLng.lng = event.latLng.lng();
            channel.objects.emulocationserver.sendLocation(event.latLng.lat(), event.latLng.lng());
        });

        showPendingLocation = function(lat, lng) {
            // Called from Qt code to show a pending location on the UI map.
            // This point has NOT been sent to the AVD.
            // Code to set location marker on the map. Move this to a signal event handler.

            var latLng = new google.maps.LatLng(lat, lng);
            gStartMarker.setPosition(latLng);



            var blackDot = 'data:image/svg+xml, \
                    <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" \
                            viewBox="0 0 24 24" fill="#000000"> \
                        <circle cx="12" cy="12" r="10" fill="#black" opacity=".1" /> \
                        <circle cx="12" cy="12" r="8" stroke="white" stroke-width="2" \
                            fill="#ffffff" /> \
                    </svg>';
            var blackDotImage = {
              url: blackDot,
              size: new google.maps.Size(24, 24),
              origin: new google.maps.Point(0, 0),
              anchor: new google.maps.Point(12, 12),
              scaledSize: new google.maps.Size(25, 25)
            };
//            gStartMarker.setIcon(gFirstPoint ? null  // Default "pin"
//                                               : blackDotImage);
//            gStartMarker.setIcon(blackDotImage); // ??
            console.warn('gFirstPoint was ' + gFirstPoint); // ??
            gFirstPoint = !gFirstPoint;
            gMap.setCenter(latLng);
        }

        setDeviceLocation = function(lat, lng) {
            // Called from Qt code to show the blue marker to display the emulator location on the map.
            // Code to set location marker on the map. Move this to a signal event handler.

            var latLng = new google.maps.LatLng(lat, lng);
            console.warn('Route page setting blue dot'); // ??
            gStartMarker.setPosition(latLng);
            var blueDot = 'data:image/svg+xml, \
                    <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" \
                            viewBox="0 0 24 24" fill="#000000"> \
                        <circle cx="12" cy="12" r="10" fill="#black" opacity=".1" /> \
                        <circle cx="12" cy="12" r="8" stroke="white" stroke-width="2" \
                            fill="#4286f5" /> \
                    </svg>';
            var image = {
              url: blueDot,
              size: new google.maps.Size(24, 24),
              origin: new google.maps.Point(0, 0),
              anchor: new google.maps.Point(12, 12),
              scaledSize: new google.maps.Size(25, 25)
            };
            gStartMarker.setIcon(image);
        }

        // Add Google search box
        // Create the search box and link it to the UI element.
        var input = /** @type {HTMLInputElement} */ (
                document.getElementById('pac-input'));
        gMap.controls[google.maps.ControlPosition.TOP_CENTER].push(input);

        var searchBox = new google.maps.places.SearchBox(
                /** @type {HTMLInputElement} */
                (input));

        // Listen for the event fired when the user selects an item from the
        // pick list. Retrieve the matching places for that item.
        google.maps.event.addListener(searchBox, 'places_changed', function() {
            var places = searchBox.getPlaces();

            for (var i = 0, marker; marker = gMarkers[i]; i++) {
                marker.setMap(null);
            }

            gMarkers = [];
            // For each place, get the icon, place name, and location.
            var bounds = new google.maps.LatLngBounds();
            var place = null;
            var viewport = null;
            for (var i = 0; place = places[i]; i++) {
                var image = {
                    url: place.icon,
                    size: new google.maps.Size(71, 71),
                    origin: new google.maps.Point(0, 0),
                    anchor: new google.maps.Point(17, 34),
                    scaledSize: new google.maps.Size(25, 25)
                };

                // Create a marker for each place.
                var marker = new google.maps.Marker({
                    map: gMap,
                    icon: image,
                    title: place.name,
                    position: place.geometry.location
                });
                viewport = place.geometry.viewport;
                gMarkers.push(marker);

                bounds.extend(place.geometry.location);
            }
            gMap.setCenter(bounds.getCenter());
        });

        // Bias the SearchBox results towards places that are within the bounds of the
        // current map's viewport.
        google.maps.event.addListener(gMap, 'bounds_changed', function() {
          var bounds = gMap.getBounds();
          searchBox.setBounds(bounds);
        });
    }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?libraries=places&key=AIzaSyABrfflV49aFWF4Kohsf1VSx68td8f-sFY&callback=initMap" async defer></script>
</body>
</html>
