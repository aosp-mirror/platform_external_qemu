<!DOCTYPE html>
<html>
<head>
    <title>Android Emulator Location Picker</title>
    <meta name="viewport" content="initial-scale=1.0">
    <meta charset="utf-8">
<style>
#map {
    height: 100%;
}

html, body {
    height: 100%;
    margin: 0px;
    padding: 0px;
}
#description {
        font-family: Roboto;
        font-size: 15px;
        font-weight: 300;
      }

      #infowindow-content .title {
        font-weight: bold;
      }

      #infowindow-content {
        display: none;
      }

      #map #infowindow-content {
        display: inline;
      }

      .pac-card {
        margin: 10px 10px 0 0;
        border-radius: 2px 0 0 2px;
        box-sizing: border-box;
        -moz-box-sizing: border-box;
        outline: none;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        background-color: #fff;
        font-family: Roboto;
      }

      #pac-container {
        padding-bottom: 12px;
        margin-right: 12px;
      }

      .pac-controls {
        display: inline-block;
        padding: 5px 11px;
      }

      .pac-controls label {
        font-family: Roboto;
        font-size: 13px;
        font-weight: 300;
      }

      #pac-input {
        background-color: #fff;
        font-family: Roboto;
        font-size: 15px;
        font-weight: 300;
        padding: 0 11px 0 13px;
        text-overflow: ellipsis;
        width: 85%;
        margin-top: 12px;
        height: 36px;
      }

      #pac-input:focus {
        border-color: #4d90fe;
      }

      #title {
        color: #fff;
        background-color: #4d90fe;
        font-size: 25px;
        font-weight: 500;
        padding: 6px 12px;
      }
      #target {
        width: 345px;
      }
</style>
</head>
<body>
    <input id="pac-input" class="controls" type="text" placeholder="Search">

<!-- This looks bad
    <div>
    <strong>Mode of Travel: </strong>
    <select id="mode" onchange="calcRoute();">
      <option value="DRIVING">Driving</option>
      <option value="WALKING">Walking</option>
      <option value="BICYCLING">Bicycling</option>
      <option value="TRANSIT">Transit</option>
    </select>
    </div>
-->

    <div id="map"></div>
    <script>
    // Googleplex!
    var lastLatLng = {lat: 37.4220919, lng: -122.0826088};
    var gMap;
    var gFirstPoint;
    var gStartLatLng;
    var gEndLatLng;
    var gDirectionsService;
    var gDirectionsDisplay;
    var gTravelModeString = "DRIVING";

    // Callback function for Maps API
    function initMap() {
        var infoWindow = new google.maps.InfoWindow;
        var gMarkers = [];
        // Create a map object and specify the DOM element for display.
        gMap = new google.maps.Map(document.getElementById('map'), {
            center: lastLatLng,
            zoom: 10,
            zoomControl: true,
            disableDefaultUI: true
        });

        gFirstPoint = true;

        // Register a listener that sets a new marker wherever user clicks
        // on the map.
        google.maps.event.addListener(gMap, 'click', function(event) {
            if (gFirstPoint) {
                console.warn('JK Route page: First click'); // ??
                gStartLatLng = event.latLng;

                // Place the 'start' marker
                gStartMarker = new google.maps.Marker({
                    map: gMap,
                    position: event.latLng
                });
                // Remove the old path
                if (gDirectionsDisplay != null) {
                    gDirectionsDisplay.setMap(null);
                    gDirectionsDisplay = null;
                }
            } else {
                console.warn('JK Route page: Second click'); // ??
                gEndLatLng = event.latLng;
                // Remove the start marker: the route has its own markers
                gStartMarker.setMap(null);
                calcRoute();
            }
            gFirstPoint = !gFirstPoint;
        });

        // Receive the mode of travel from the host
        setTravelMode = function(mode) {
            switch (mode) {
                case 0:
                default: gTravelModeString = "DRIVING";   break;
                case 1:  gTravelModeString = "WALKING";   break;
                case 2:  gTravelModeString = "BICYCLING"; break;
                case 3:  gTravelModeString = "TRANSIT";   break;
            }
            console.warn('route.html: js In setTravelMode(), mode is now ' + gTravelModeString); // ??
            // ?? Need to call calcRoute IF we have start and end points
        }

        // Receive the selected route from the host
        setRouteOnMap = function(routeJson) {
            console.warn('route.html: js In setRouteOnMap(), JSON is ' + // ??
                       routeJson.length + ' characters'); // ??
            if (routeJson.length > 0) {
                var theRoute = JSON.parse(routeJson);
                gDirectionsDisplay.setDirections(theRoute);
            }
        }

        // Add Google search box
        // Create the search box and link it to the UI element.
        var input = /** @type {HTMLInputElement} */ (
                document.getElementById('pac-input'));
        gMap.controls[google.maps.ControlPosition.TOP_CENTER].push(input);

        var searchBox = new google.maps.places.SearchBox(
                /** @type {HTMLInputElement} */
                (input));

        // Listen for the event fired when the user selects an item from the
        // pick list. Retrieve the matching places for that item.
        google.maps.event.addListener(searchBox, 'places_changed', function() {
            var places = searchBox.getPlaces();

            for (var i = 0, marker; marker = gMarkers[i]; i++) {
                marker.setMap(null);
            }

            gMarkers = [];
            // For each place, get the icon, place name, and location.
            var bounds = new google.maps.LatLngBounds();
            var place = null;
            var viewport = null;
            for (var i = 0; place = places[i]; i++) {
                var image = {
                    url: place.icon,
                    size: new google.maps.Size(71, 71),
                    origin: new google.maps.Point(0, 0),
                    anchor: new google.maps.Point(17, 34),
                    scaledSize: new google.maps.Size(25, 25)
                };

                // Create a marker for each place.
                var marker = new google.maps.Marker({
                    map: gMap,
                    icon: image,
                    title: place.name,
                    position: place.geometry.location
                });
                viewport = place.geometry.viewport;
                gMarkers.push(marker);

                bounds.extend(place.geometry.location);
            }
            gMap.setCenter(bounds.getCenter());
        });

        // Bias the SearchBox results towards places that are within the bounds of the
        // current map's viewport.
        google.maps.event.addListener(gMap, 'bounds_changed', function() {
          var bounds = gMap.getBounds();
          searchBox.setBounds(bounds);
        });

        // Set up to retrieve directions
        gDirectionsService = new google.maps.DirectionsService();
    }

    function calcRoute() {
        var request = {
            origin: gStartLatLng,
            destination: gEndLatLng,
            travelMode: gTravelModeString
        };
        gDirectionsDisplay = new google.maps.DirectionsRenderer();
        gDirectionsDisplay.setMap(gMap);
        console.warn('JK Route page: calcRoute requesting route...'); // ??
        gDirectionsService.route(request, function(result, status) {
            if (status != 'OK') {
                console.warn('JK Route result had status != OK'); // ??
                return;
            }
            gDirectionsDisplay.setDirections(result);

            // Calculate the total duration of the route
            var totalDuration = 0.0;
            for (var routeIdx = 0;
                 routeIdx < result.routes.length;
                 routeIdx++)
            {
                for (var legIdx = 0;
                     legIdx < result.routes[routeIdx].legs.length;
                     legIdx++)
                {
                    for (var stepIdx = 0;
                         stepIdx < result.routes[routeIdx].legs[legIdx].steps.length;
                         stepIdx++)
                    {
                        totalDuration += result.routes[routeIdx].legs[legIdx]
                                             .steps[stepIdx].duration.value;
                    }
                }
            }

            var fullResult = JSON.stringify(result);
            console.warn('Stringified full result is ' + fullResult.length + // ??
                         ' characters, duration ' + totalDuration); // ??
            channel.objects.emulocationserver.sendFullRouteToEmu(totalDuration, fullResult);
        });
    }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?libraries=places&key=AIzaSyABrfflV49aFWF4Kohsf1VSx68td8f-sFY&callback=initMap" async defer></script>
</body>
</html>
