    <script>

        gMap = new google.maps.Map(document.getElementById('map'), {

        gFirstPoint = true;
//        // Create a 'start' marker
//        gStartMarker = new google.maps.Marker({

//        });
//        gEndMarker = new google.maps.Marker({
//            map: gMap,

//        });

        // Register a listener that sets a new marker wherever user clicks

        google.maps.event.addListener(gMap, 'click', function(event) {
            // var startMarker = 'data:image/svg+xml, \
            //         <svg xmlns="http://www.w3.org/2000/svg" width="44px" height="44px" \
            //                 viewBox="0 0 44 44"> \
            //             <circle cx="22" cy="22" r="14" stroke="#666666" stroke-width="7" \
            //                     fill="#ffffff" /> \
            //         </svg>';
            // var startMarkerImage = {
            //   url: startMarker,

            // };

            // var endMarkerImage = {

            if (gFirstPoint) {

                // Place the 'start' marker
                gStartMarker = new google.maps.Marker({

//                console.warn('JZK Route page: start: ' + gStartLatLng); // ??

//                // Place the 'end' marker

                // Remove the start marker: the route has its own markers

        setTravelMode = function(mode) {
            switch (mode) {
                case 0:
                default: gTravelModeString = "DRIVING";   break;
                case 1:  gTravelModeString = "WALKING";   break;
                case 2:  gTravelModeString = "BICYCLING"; break;
                case 3:  gTravelModeString = "TRANSIT";   break;
            }
            console.warn('route.html: js In setTravelMode(), mode is now ' + gTravelModeString); // ??
            // ?? Need to call calcRoute IF we have start and end points
        }

        // Add Google search box
        // Create the search box and link it to the UI element.
        var input = /** @type {HTMLInputElement} */ (
                document.getElementById('pac-input'));
        gMap.controls[google.maps.ControlPosition.TOP_CENTER].push(input);

        var searchBox = new google.maps.places.SearchBox(
                /** @type {HTMLInputElement} */
                (input));

        // Listen for the event fired when the user selects an item from the
        // pick list. Retrieve the matching places for that item.
        google.maps.event.addListener(searchBox, 'places_changed', function() {
            var places = searchBox.getPlaces();

            for (var i = 0, marker; marker = gMarkers[i]; i++) {
                marker.setMap(null);
            }

            gMarkers = [];
            // For each place, get the icon, place name, and location.
            var bounds = new google.maps.LatLngBounds();
            var place = null;
            var viewport = null;
            for (var i = 0; place = places[i]; i++) {
                var image = {
                    url: place.icon,
                    size: new google.maps.Size(71, 71),
                    origin: new google.maps.Point(0, 0),
                    anchor: new google.maps.Point(17, 34),
                    scaledSize: new google.maps.Size(25, 25)
                };

                // Create a marker for each place.
                var marker = new google.maps.Marker({
                    map: gMap,
                    icon: image,
                    title: place.name,
                    position: place.geometry.location
                });
                viewport = place.geometry.viewport;
                gMarkers.push(marker);

                bounds.extend(place.geometry.location);
            }
            gMap.setCenter(bounds.getCenter());
        });

        // Bias the SearchBox results towards places that are within the bounds of the
        // current map's viewport.
        google.maps.event.addListener(gMap, 'bounds_changed', function() {
          var bounds = gMap.getBounds();
          searchBox.setBounds(bounds);
        });

        // Set up to retrieve directions
        gDirectionsService = new google.maps.DirectionsService();
    }

    function distanceBetween(start, end) {
        var startLat = start.lat();
        var startLon = start.lng();
        var endLat   = end.lat();
        var endLon   = end.lng();

        var startLatRadians = startLat * Math.PI / 180.0;
        var startLonRadians = startLon * Math.PI / 180.0;
        var endLatRadians   = endLat   * Math.PI / 180.0;
        var endLonRadians   = endLon   * Math.PI / 180.0;

        var deltaLatRadians = endLatRadians - startLatRadians;
        var deltaLonRadians = endLonRadians - startLonRadians;

        var sinDeltaLatBy2 = Math.sin(deltaLatRadians / 2.0);
        var sinDeltaLonBy2 = Math.sin(deltaLonRadians / 2.0);

        var termA =   sinDeltaLatBy2 * sinDeltaLatBy2
                       + Math.cos(startLatRadians) * Math.cos(endLatRadians) *
                         sinDeltaLonBy2 * sinDeltaLonBy2;
        var termC = 2.0 * Math.atan2(Math.sqrt(termA), Math.sqrt(1.0 - termA));

        var earthRadius = 6371000.; // Meters

        var dist = earthRadius * termC;
        return dist;
   }

    function calcRoute() {
        const MINIMUM_DISTANCE = 50; // Meters
        const MINIMUM_TIME     = 10; // Seconds
        var request = {
            origin: gStartLatLng,
            destination: gEndLatLng,
            travelMode: gTravelModeString
        };
        gDirectionsDisplay = new google.maps.DirectionsRenderer();
        gDirectionsDisplay.setMap(gMap);
        gDirectionsService.route(request, function(result, status) {
            if (status == 'OK') {
// vv ??
                var r0 = result.routes[0];
                var leg0 = r0.legs[0];
                var theSteps = leg0.steps;
                var numSteps = theSteps.length;

                console.warn('JZK Route result: ' + result.routes.length
                             + ' routes, route[0] has ' + r0.legs.length
                             + ' legs, leg[0] has ' + numSteps
                             + ' steps and lasts ' + leg0.duration.text); // ??
                // Always accept the first point of the route
                var previousPoint = theSteps[0].path[0];
                var numPointsSent = 0;
                channel.objects.emulocationserver.sendRouteToEmu(
                    numPointsSent, previousPoint.lat(), previousPoint.lng(), 0.0);
                numPointsSent++;
//                console.warn('     pt 0: ' + theSteps[0].path[0]
//                             + ', VERY FIRST POINT **');
//                var marker = new google.maps.Marker({
//                    map: gMap,
//                    position: theSteps[0].path[0]
//                });

                for (var stepIdx = 0; stepIdx < numSteps; stepIdx++) {
                    var thisStep = theSteps[stepIdx];
                    // ?? How to protect this from /0?
                    var stepSpeed = thisStep.distance.value / thisStep.duration.value;
                    var thisPath = theSteps[stepIdx].path;
                    var numPts = thisPath.length;
//                    console.warn('  step ' + stepIdx + ' has ' + numPts
//                                 + ' points; distance '
//                                 + theSteps[stepIdx].distance.value
//                                 + ' meters, and lasts '
//                                 + theSteps[stepIdx].duration.value
//                                 + ' seconds'); // ??
                    for (var ptIdx = 1; ptIdx < numPts; ptIdx++) {
                        var thisPoint = thisPath[ptIdx];
                        var dist = distanceBetween(previousPoint, thisPoint);
                        // Determine how long it will take to get here
                        // from the previously-accepted point
                        var time = dist / stepSpeed;
//                            if (dist < MINIMUM_DISTANCE) { // ??
//                                console.warn('     pt ' + ptIdx // ??
//                                             + ': ' + thisPath[ptIdx]
//                                             + ', distance ' + dist
//                                             + ' meters, time ' + time
//                                             + ' -- too close');
//                            } // ??
                        if (ptIdx != numPts-1) {
                            // This is not the last point of the step.
                            // Accept it only if it is far enough (in
                            // space-time) from the last point we accepted.

                            if (dist < MINIMUM_DISTANCE) continue;
//                            if (dist / stepSpeed < MINIMUM_TIME) { // ??
//                                console.warn('     pt ' + ptIdx // ??
//                                             + ': ' + thisPath[ptIdx]
//                                             + ', distance ' + dist
//                                             + ' meters, time ' + time
//                                             + ' -- time too short');
//                            } // ??
                            if (time < MINIMUM_TIME) continue;
//                            console.warn('     pt ' + ptIdx // ??
//                                         + ': ' + thisPath[ptIdx]
//                                         + ', distance ' + dist
//                                         + ' meters, time ' + time
//                                         + ' -- TAKE IT');
                        }
//                        else console.warn('     pt ' + ptIdx // ??
//                                         + ': ' + thisPath[ptIdx]
//                                         + ', LAST POINT OF STEP **');

                        // Send this point to the Emulator
                        channel.objects.emulocationserver.sendRouteToEmu(
                            numPointsSent, thisPoint.lat(), thisPoint.lng(), time);

                        numPointsSent++;
                        previousPoint = thisPoint;

//                        var marker = new google.maps.Marker({
//                            map: gMap,
//                            position: thisPoint
//                        });
                    }
                }
                // Let the Emulator know that it has all the data
                channel.objects.emulocationserver.sendRouteToEmu(-1, 0.0, 0.0, 0.0);
// ^^ ??
                // Show the route on the Map
                gDirectionsDisplay.setDirections(result);
            }
            else console.warn('JZK Route result had status != OK'); // ??
        });
    }
