# Copy this to /etc/nginx/conf.d
# Make sure you have no other server on port 80, or change to a different port.

upstream pythonserver {
    # // Change this if you run the websocket server on a different port
    server localhost:5000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen         80 default_server;
    listen         [::]:80 default_server;

    # server_name    something.something.sensible.com;

    # Copy all your things here:
    root           /var/www/html/webrtc_sample;
    index          index.html;
    try_files $uri /index.html;

    # use this for connecting to the ws server: ws://${my_ip}/socket
    location /socket {
        proxy_pass http://pythonserver;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
